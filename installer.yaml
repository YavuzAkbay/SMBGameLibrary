Packages:
  - Version: 2.0.0
    RequiredApiVersion: 6.15.0
    ReleaseDate: 2026-07-08
    PackageUrl: https://github.com/YavuzAkbay/SMBGameLibrary/releases/download/v2.0.0/NasConnector.pext
    Changelog:
      - Much faster installs — the "Scanning files on NAS…" step now walks the game folder once instead of three times, removing a per-file network round-trip that made large games crawl
      - Much faster library scans — game folders are now classified in parallel instead of one at a time
      - Windows Defender false positives on game files no longer break installs — the plugin adds your NAS and install folders to Defender's exclusion list (one UAC prompt) and retries automatically
      - New settings button to add your library & install folders to Windows Defender exclusions ahead of time
      - Smarter game executable detection — scores candidates by name match, engine layout (Unity/Unreal/Godot), folder, size and PE subsystem, so the right game launches more often
      - The "pick an executable" fallback now lists the most likely game first
      - Uninstall now shows a cancellable progress bar with per-file status instead of freezing the UI on large local copies
      - Installing no longer briefly freezes Playnite — the SMB connect, free-space check and copy all run inside a cancellable progress dialog
